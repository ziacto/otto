# Minimal CI: unit tests + lint on every push/PR to main. No emulator, no
# signing — release packaging still happens locally until a real keystore exists.
name: Android CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: gradle

      - name: Run unit tests and lint
        run: ./gradlew testDebugUnitTest lintDebug --no-daemon
